apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: stadium-iq
  labels:
    app: stadium-iq
    version: "1.0.0"
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "5"
    spec:
      containerConcurrency: 80
      containers:
        - image: gcr.io/YOUR_GCP_PROJECT_ID/stadium-iq
          resources:
            limits:
              memory: 512Mi
              cpu: "1"
          env:
            - name: GOOGLE_CLOUD_PROJECT
              value: YOUR_GCP_PROJECT_ID
            - name: GOOGLE_CLOUD_REGION
              value: us-central1
            - name: FIRESTORE_ENABLED
              value: "true"
            - name: LOG_LEVEL
              value: INFO
            - name: MAX_CONCURRENT_LLM_CALLS
              value: "3"
            - name: CROWD_AMBER_THRESHOLD
              value: "70.0"
            - name: CROWD_RED_THRESHOLD
              value: "85.0"
          ports:
            - containerPort: 8080
          livenessProbe:
            httpGet:
              path: /health
            initialDelaySeconds: 10
            periodSeconds: 30
